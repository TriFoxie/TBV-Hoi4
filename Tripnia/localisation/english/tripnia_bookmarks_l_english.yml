l_english:
  #BEXANY
  BEX_bookmarks_desc: "A cold and brutal civil war has been raging in Bexany for years, with communist sympathisers and fascists battling for control of the country. Many years of fighting dragged on until Boders became the new leader of the fascist party. With her unmatched aggression she wiped out all but the last dregs of communist resistance, however often at a great cost of human lives.\n\n As the last remnants of communism are about to be extinguished, Bexany must stamp out the revolution once and for all, and progress towards the dream of an empire."